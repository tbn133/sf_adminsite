[tools]
node = "20"

[tasks.install]
description = "Install dependencies"
run = "npm install"

[tasks.init]
description = "Initialize project (first time setup)"
run = """
npm install
cp -n .env.example .env || true
"""

[tasks.dev]
description = "Run development server"
run = "npm run dev"

[tasks.build]
description = "Build for production"
run = "npm run build"

[tasks.lint]
description = "Run linter"
run = "npm run lint"

[tasks.format]
description = "Format code"
run = "npm run format"
